\* Unsafe variant: same bound, same invariant, but uses UnsafeNext (which
\* allows truncation regardless of pending reads). TLC should produce a
\* counter-example: a state where a pending_read index exceeds len.
\* That counter-example is the evidence that the SafeRollback guard is
\* load-bearing — without it NoGhostReads is violated.
SPECIFICATION UnsafeSpec
INVARIANT NoGhostReads
CONSTANT MaxLen = 4
