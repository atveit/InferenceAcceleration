\* Non-interference, safety-only.
\* Bounds: |Tokens| = 2, MaxTraceLen = 3, MaxDraftLen = 2.
\* The shipped audit-cfg used 5/3, but with BoundedSeq the state space
\* grows fast; 3/2 still covers >1000 distinct reachable states and
\* exercises non-empty match, full match, and full mismatch.
\*
\* CHECK_DEADLOCK FALSE: in this model, when accepted_output =
\* target_model_trace, both actions become disabled (DrafterPropose
\* requires Len(accepted_output) < Len(target_model_trace); Verify
\* requires drafter_proposal /= << >>). That is the *intended* terminal
\* state, not a stuck system. TLC's default deadlock detector would
\* flag it and obscure the safety invariant we actually care about.
SPECIFICATION Spec
INVARIANT NonInterference
CONSTANTS
    Tokens = {t1, t2}
    MaxTraceLen = 3
    MaxDraftLen = 2
CHECK_DEADLOCK FALSE
